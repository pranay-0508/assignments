<!DOCTYPE html>
<html>
<head>
    <title>Palindrome Checker</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            text-align: center;
            color: white;
        }
        .box {
            background: white;
            color: black;
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        input {
            width: 80%;
            padding: 8px;
            margin: 10px;
            text-align: center;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            padding: 8px 15px;
            background: #ff7e5f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #e7654a;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Palindrome Number Checker</h2>
    <input type="number" id="num" placeholder="Enter a number"><br>
    <button onclick="checkPalindrome()">Check</button>
    <div id="result"></div>
</div>
<script>
function checkPalindrome() {
    let n = document.getElementById("num").value;
    let original = n;
    let reverse = "";
    for (let i = n.length - 1; i >= 0; i--) {
        reverse += n[i];
    }
    if (original === reverse) {
        document.getElementById("result").innerHTML = "✅ Palindrome Number";
    } else {
        document.getElementById("result").innerHTML = "❌ Not a Palindrome";
    }
}
</script>
</body>
</html>
