<!DOCTYPE html>
<html>
<head>
    <title>Online Book Store</title>
    <style>
        body{
            font-family: Arial;
            background-color: lightblue;
            padding:20px;
        }
        h1{
            text-align:center;
        }
        .section{
            display:none;
            background:white;
            padding:20px;
            margin-top:10px;
            border-radius:10px;
        }
        button{
            padding:10px 20px;
            margin:5px;
            background-color:darkblue;
            color:white;
            border:none;
            cursor:pointer;
        }
        table{
            border-collapse:collapse;
            width:80%;
        }
        table,th,td{
            border:1px solid black;
        }
        th,td{
            padding:10px;
            text-align:center;
        }
    </style>
    <script>
        function openSection(id)
        {
            document.getElementById("register").style.display="none";
            document.getElementById("login").style.display="none";
            document.getElementById("catalog").style.display="none";
            document.getElementById(id).style.display="block";
        }
    </script>
</head>
<body>
<h1>ONLINE BOOK STORE</h1>
<button onclick="openSection('register')">Registration</button>
<button onclick="openSection('login')">Login</button>
<button onclick="openSection('catalog')">Book Catalog</button>
<!-- Registration -->
<div id="register" class="section">
<h2>Registration Form</h2>
<form>
    <label for="fullname">Full Name :</label>
<input type="text" id="fullname" placeholder="Full Name"><br><br>
<label for="email">Email :</label>
<input type="email" placeholder="Email"><br><br>
<label for="password">Password :</label>
<input type="password" placeholder="Password"><br><br>
<label for="phone">Phone Number :</label>
<input type="text" placeholder="Phone Number"><br><br>
<label for="address">Address :</label><br>
<textarea rows="4" cols="30" placeholder="Address" id="address"></textarea><br><br>
<input type="submit" value="Register">
</form>
</div>
<!-- Login -->
<div id="login" class="section">
<h2>Login Form</h2>
<form>
    <label for="username">Username :</label>
    <input type="text" id="username" placeholder="Username"><br><br>
    <label for="password">Password :</label>
    <input type="password" id="password" placeholder="Password"><br><br>
    <input type="submit" value="Login">
</form>
</div>
<!-- Book Catalog -->
<div id="catalog" class="section">
<h2>Book Catalog</h2>
<table>
<tr>
    <th>Book Name</th>
    <th>Author</th>
    <th>Price</th>
</tr>
<tr>
    <td>Java Programming</td>
    <td>James Gosling</td>
    <td>500</td>
</tr>
<tr>
    <td>Python Basics</td>
    <td>Guido Van Rossum</td>
    <td>450</td>
</tr>
<tr>
    <td>Web Technology</td>
    <td>Thomas Powell</td>
    <td>600</td>
</tr>
</table>
</div>
</body>
</html>
