<!DOCTYPE html>
<html>
<head>
    <title>Assignment 6</title>
    <style>
        body{
            font-family: Arial;
            background-color: lightblue;
            padding:20px;
        }
        h1{
            text-align:center;
        }
        .section{
            background:white;
            padding:20px;
            margin-top:20px;
            border-radius:10px;
            width:400px;
        }
        input,textarea{
            margin-top:5px;
            margin-bottom:10px;
            padding:8px;
            width:90%;
        }
        button{
            padding:10px 20px;
            background-color:darkblue;
            color:white;
            border:none;
        }
    </style>
    <script>
        function verifyLogin()
        {
            var email=document.getElementById("email").value;
            var password=document.getElementById("password").value;
            if(email=="")
            {
                alert("Enter Email ID");
                return false;
            }
            if(password=="")
            {
                alert("Enter Password");
                return false;
            }
            if(password.length < 6)
            {
                alert("Password must contain minimum 6 characters");
                return false;
            }
            alert("Login Successful");
        }
    </script>
</head>
<body>
<h1>ONLINE BOOK STORE</h1>
<!-- Registration Page -->
<div class="section">
<h2>Registration Page</h2>
<form>
    <label for="name">Name :</label><br>
<input type="text" placeholder="Enter Name"><br><br>
<label for="email">Email ID :</label><br>
<input type="email" placeholder="Enter Email"><br><br>
<label for="password">Password :</label><br>
<input type="password" placeholder="Enter Password"><br><br>
<label for="phone">Phone Number :</label><br>
<input type="text" placeholder="Enter Phone Number"><br><br>
<label for="address">Address :</label><br>
<textarea rows="4" placeholder="Enter Address"></textarea><br><br>
<button type="submit">Register</button>
</form>
</div>
<!-- Login Page -->
<div class="section">
<h2>User Login</h2>
<form>
<label for="email">Email ID :</label><br>
<input type="email" id="email" placeholder="Enter Email"><br><br>
<label for="password">Password :</label><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>
<button type="button" onclick="verifyLogin()">Login</button>
</form>
</div>
</body>
</html>
