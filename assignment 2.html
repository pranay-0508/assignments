<!DOCTYPE html>
<html>
<head>
    <title>Book Information</title>
    <style>
        body{
            font-family: Arial;
            background-color: lightyellow;
        }
        table{
            width: 80%;
            border-collapse: collapse;
            margin: auto;
        }
        th{
            background-color: green;
            color: white;
            padding: 10px;
        }
        td{
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        h2{
            text-align: center;
        }
    </style>
</head>
<body>
<h2>Book Information Table</h2>
<table>
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Publisher</th>
        <th>Edition</th>
        <th>Price</th>
    </tr>
    <tr>
        <td>Java</td>
        <td>James Gosling</td>
        <td>12345</td>
        <td>Oracle</td>
        <td>5th</td>
        <td>500</td>
    </tr>
    <tr>
        <td>Python</td>
        <td>Guido</td>
        <td>67890</td>
        <td>Python Org</td>
        <td>3rd</td>
        <td>450</td>
    </tr>
</table>
</body>
</html>
